<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindset</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <section>
      <h1 id="titulo">Mindset</h1>
    </section>
    <section id="formulario">
      <div>
        <form>
          <label for="modoJuego">Mode de juego</label>
          <select name="modoJuego" id="modoJuego">
            <option value="solitario">Modo solitario </option>
            <option value="pvp">Modo PvP Local </option>
            <option value="practica">Modo Libre </option>
          </select>
          <br>
          <label for="name">Nombre</label>
          <input type="text" id="userName">
          <br>
          <label for="dificultad">Dificultad</label>
          <select name="dificultad" id="dificultad">
            <option value="facil">Facil (4x4) </option>
            <option value="intermedio">Intermedio (6x6) </option>
            <option value="dificil">Dificil (8x8) </option>
          </select>
          <br>
          <label for="tematica">Tematica visual</label>
          <select name="tematica" id="tematica">
            <option value="1">1 </option>
            <option value="2">2 </option>
            <option value="3">3 </option>
          </select>
          <br>
          <button>
            <p>Iniciar Juego</p>
          </button>
        </form>
      </div>
    </section>
  </main>
  <script src="./js/menu.js"></script>
</body>
</html>
