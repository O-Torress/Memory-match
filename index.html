<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mindset - Un juego de memoria en parejas interactivo.">
  <title>Mindset</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <main>
    <section>
      <h1 id="titulo">Mindset</h1>
      
      <section id="formulario">
        <form id="config-form">
          <div class="form-group">
            <label for="modoJuego">Modo de juego</label>
            <select name="modoJuego" id="modoJuego">
              <option value="solitario">Modo solitario </option>
              <option value="pvp">Modo PvP Local </option>
              <option value="practica">Modo Libre </option>
            </select>
          </div>
          <br>

          <div class="form-group" id="player1-group">
            <label for="player1Name" id="lbl-player1">Nombre del Jugador</label>
            <input type="text" id="player1Name" placeholder="Tu nombre...">
          </div>
          
          <br>
          <div class="form-group hidden" id="player2-group">
            <label for="player2Name">Nombre del Jugador 2</label>
            <input type="text" id="player2Name" placeholder="Tu nombre...">
          </div>
          <br>

          <div class="form-group">
            <label for="dificultad">Dificultad</label>
            <select name="dificultad" id="dificultad">
              <option value="facil">Fácil (4x4)</option>
              <option value="intermedio">Intermedio (6x6)</option>
              <option value="dificil">Difícil (8x8)</option>
            </select>
          </div>
          <br>

          <div class="form-group">
            <label for="tematica">Temática visual</label>
            <select name="tematica" id="tematica">
              <option value="1">1 </option>
              <option value="2">2 </option>
              <option value="3">3 </option>
            </select>
          </div>
          <br>
          
          <button id="btn-start" type="submit">Iniciar Juego</button>
        </form>
      </section>
    </section>

    <section id="game-screen" class="hidden">
      <div id="hud"></div>
      <div id="board-container"></div>
      <div id="achievements-bar"></div>
    </section>

  </main>

  <div id="end-screen-overlay" class="hidden">
    <div id="end-screen"></div>
  </div>

  <div id="toast-container"></div>

  <script src="./js/temas.js"></script>
  <script src="./js/timer.js"></script>
  <script src="./js/logros.js"></script>
  <script src="./js/board.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/modes.js"></script>
  <script src="./js/endScreen.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
